<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onchain Trading Demo</title>
  <style>
    *{box-sizing:border-box} body{margin:0;background:#f1f5f9;font-family:Arial,Helvetica,sans-serif;color:#111827}.phone{max-width:430px;min-height:100vh;margin:0 auto;background:#fff;box-shadow:0 10px 40px rgba(0,0,0,.12);position:relative;overflow:hidden}.hero{background:linear-gradient(135deg,#1d4ed8,#0ea5e9);color:#fff;padding:24px 22px 34px;border-bottom-left-radius:28px;border-bottom-right-radius:28px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}.menu{font-size:32px}.wallet{border:1px solid rgba(255,255,255,.85);background:rgba(255,255,255,.12);color:white;border-radius:12px;padding:12px 18px;font-size:15px}.hero h1{font-size:38px;margin:0}.hero p{opacity:.85}.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center;padding:18px 14px;font-weight:700}.quick .ico{font-size:28px;color:#2563eb}.main{padding:0 18px 90px}.market-title{display:flex;justify-content:space-between;align-items:flex-end;margin:25px 0 18px}.market-title h2{font-size:32px;margin:0;font-weight:500}.balance{text-align:right}.balance small{color:#64748b}.tabs{display:flex;gap:10px;margin-bottom:18px}.tab{border:1px solid #e2e8f0;background:white;border-radius:999px;padding:12px 19px;font-size:16px;font-weight:600;box-shadow:0 4px 10px rgba(0,0,0,.06)}.tab.active{background:#2563eb;color:white}.coin{width:100%;border:0;border-bottom:1px solid #e5e7eb;background:white;display:grid;grid-template-columns:56px 1fr auto auto;gap:12px;align-items:center;padding:16px 4px;text-align:left;border-radius:14px;cursor:pointer}.coin:active{transform:scale(.99)}.coin-icon{width:42px;height:42px;border-radius:50%;background:#fb923c;color:white;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px}.coin h3{margin:0;font-size:22px}.coin small{color:#64748b;font-size:16px}.price{font-size:20px;font-weight:800}.green{color:#22c55e}.red{color:#ef4444}.badge{color:white;padding:10px 12px;border-radius:9px;font-weight:700}.badge.green{background:#22c55e;color:white}.badge.red{background:#ef4444;color:white}.detail{position:fixed;inset:0;background:white;z-index:10;overflow-y:auto;padding:20px;max-width:430px;margin:0 auto;left:0;right:0}.back{border:0;background:white;font-size:32px;margin-bottom:18px}.detail-head{display:flex;justify-content:space-between;align-items:center}.coin-name{display:flex;align-items:center;gap:12px}.detail h2{font-size:30px;margin:0}.big-price{font-size:38px;margin:22px 0 6px;font-weight:700}.chart{background:#020617;border-radius:16px;padding:14px;margin-top:22px}.ranges{display:flex;justify-content:space-around;color:#94a3b8;margin-bottom:8px}.ranges span:first-child{color:#38bdf8;border-bottom:2px solid #38bdf8;padding:0 8px 5px}svg{width:100%;height:290px}.note{font-size:14px;color:#64748b}.section-title{font-size:25px;font-weight:700;margin:28px 0 14px}.order-btn{width:100%;height:56px;border:0;border-radius:14px;background:linear-gradient(90deg,#2563eb,#06b6d4);color:white;font-size:20px;font-weight:700;box-shadow:0 10px 20px rgba(37,99,235,.18)}.row{display:flex;justify-content:space-between;border-bottom:1px solid #e5e7eb;padding:16px 0;font-size:17px}.history{margin-top:24px}.history h3{margin-bottom:10px}.empty{color:#64748b}.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.62);z-index:20;display:flex;align-items:flex-end}.modal{background:white;width:100%;border-top-left-radius:24px;border-top-right-radius:24px;padding:20px}.modal-top{display:flex;justify-content:space-between;border-bottom:1px solid #e5e7eb;padding-bottom:14px}.close{border:0;background:white;font-size:30px}.choice{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px}.choice button,.input-wrap{height:54px;border:1px solid #e5e7eb;border-radius:10px;background:white;font-size:18px}.choice .up{background:#16a34a;color:white}.choice .fall{background:#dc2626;color:white}.input-wrap{display:flex;align-items:center;padding:0 12px;background:#f8fafc}.input-wrap input{flex:1;border:0;background:transparent;outline:0;font-size:20px}.submit{margin-top:14px;width:100%;height:56px;border:0;border-radius:12px;background:#15803d;color:white;font-size:20px;font-weight:700}.hide{display:none}.error{margin-top:10px;background:rgba(255,255,255,.22);padding:8px;border-radius:8px;font-size:13px}
  </style>
</head>
<body>
  <div class="phone">
    <section class="hero">
      <div class="top"><div class="menu">☰</div><button class="wallet" id="walletBtn">Connect wallet</button></div>
      <h1>Web3 Demo</h1><p>模拟交易系统 · 不涉及真实资金</p><div id="walletError" class="error hide"></div>
    </section>
    <section class="quick"><div><div class="ico">💼</div>My account</div><div><div class="ico">⬆️</div>Demo Assets</div><div><div class="ico">📊</div>AI Finance</div><div><div class="ico">💬</div>Chat</div></section>
    <main class="main">
      <div class="market-title"><h2>Market</h2><div class="balance"><small>Demo Balance</small><br><b>USDT <span id="balance">10000.00</span></b></div></div>
      <div class="tabs"><button class="tab active">Hot Coins</button><button class="tab">★</button><button class="tab">All products</button></div>
      <div id="coinList"></div>
      <div class="history"><h3>Order History</h3><div id="history" class="empty">暂无模拟订单</div></div>
    </main>
    <section id="detail" class="detail hide"></section>
    <section id="modal" class="modal-bg hide"></section>
  </div>
<script>
const coins=[
 {symbol:'BTC/USDT',api:'BTCUSDT',name:'Bitcoin',price:0,change:0,icon:'₿'},
 {symbol:'ETH/USDT',api:'ETHUSDT',name:'Ethereum',price:0,change:0,icon:'◆'},
 {symbol:'DOGE/USDT',api:'DOGEUSDT',name:'Dogecoin',price:0,change:0,icon:'Ð'},
 {symbol:'PAXG/USDT',api:'PAXGUSDT',name:'Gold Token',price:0,change:0,icon:'▰'},
 {symbol:'TRX/USDT',api:'TRXUSDT',name:'TRON',price:0,change:0,icon:'T'}
];
let market=[...coins],selected=market[0],balance=Number(localStorage.getItem('demoBalance')||10000),orders=JSON.parse(localStorage.getItem('demoOrders')||'[]'),direction='Up',candles=[];
const $=id=>document.getElementById(id);$('balance').textContent=balance.toFixed(2);
function fmt(n){return Number(n).toLocaleString('en-US',{maximumFractionDigits:n>10?4:6})}
function renderList(){ $('coinList').innerHTML=market.map(c=>`<button class="coin" onclick="openDetail('${c.symbol}')"><div class="coin-icon">${c.icon}</div><div><h3>${c.symbol}</h3><small>USDT</small></div><div class="price ${c.change>=0?'green':'red'}">${fmt(c.price)}</div><div class="badge ${c.change>=0?'green':'red'}">${c.change>0?'+':''}${c.change}%</div></button>`).join(''); }
function renderHistory(){ $('history').className=orders.length?'':'empty'; $('history').innerHTML=orders.length?orders.map(o=>`<div class="row"><span>${o.time} · ${o.coin} · ${o.direction}</span><b class="${o.pnl>=0?'green':'red'}">${o.pnl>=0?'+':''}${o.pnl} USDT</b></div>`).join(''):'暂无模拟订单'; }
async function loadPrices(){ try{ const updated=await Promise.all(coins.map(async c=>{const r=await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${c.api}`);const d=await r.json();const p=Number(d.lastPrice||0),ch=Number(d.priceChangePercent||0);return {...c,price:Number(p.toFixed(p>10?4:6)),change:Number(ch.toFixed(2))};})); market=updated; selected=market.find(c=>c.symbol===selected.symbol)||market[0]; renderList(); if(!$('detail').classList.contains('hide')) renderDetail(); }catch(e){console.log(e)} }
async function loadKlines(api){ try{ const r=await fetch(`https://api.binance.com/api/v3/klines?symbol=${api}&interval=1m&limit=34`); const d=await r.json(); if(Array.isArray(d)) candles=d.map(k=>({open:+k[1],high:+k[2],low:+k[3],close:+k[4]})); drawChart(); }catch(e){console.log(e)} }
function openDetail(symbol){ selected=market.find(c=>c.symbol===symbol)||market[0]; $('detail').classList.remove('hide'); renderDetail(); loadKlines(selected.api); }
function closeDetail(){ $('detail').classList.add('hide'); }
function renderDetail(){ $('detail').innerHTML=`<button class="back" onclick="closeDetail()">←</button><div class="detail-head"><div class="coin-name"><div class="coin-icon">${selected.icon}</div><h2>${selected.symbol}</h2></div><button class="back">☆</button></div><div class="big-price">US$ ${fmt(selected.price)}</div><div class="${selected.change>=0?'green':'red'}">US$ ${(selected.price*selected.change/100).toFixed(4)} (${selected.change}%)</div><div class="chart"><div class="ranges"><span>1M</span><span>5M</span><span>30M</span><span>1H</span><span>4H</span><span>1D</span></div><svg id="chartSvg" viewBox="0 0 540 288"></svg></div><p class="note">价格来自 Binance 实时行情，1M K线每 60 秒更新一次</p><div class="section-title">Market Statistics</div><button class="order-btn" onclick="openOrder()">Order</button><div class="row"><span>24 hours</span><span>US$ 25917</span></div><div class="row"><span>Demo balance</span><span>${balance.toFixed(2)} USDT</span></div>`; drawChart(); }
function drawChart(){ const svg=$('chartSvg'); if(!svg||!candles.length)return; const max=Math.max(...candles.map(c=>c.high)),min=Math.min(...candles.map(c=>c.low)),h=250; const scale=v=>h-((v-min)/(max-min||1))*h+12; let html=''; for(let i=0;i<5;i++) html+=`<line x1="0" x2="540" y1="${25+i*48}" y2="${25+i*48}" stroke="rgba(255,255,255,.07)"/>`; candles.forEach((c,i)=>{const x=i*15+14,up=c.close>=c.open,y=Math.min(scale(c.open),scale(c.close)),hh=Math.max(4,Math.abs(scale(c.open)-scale(c.close))),color=up?'#24d18b':'#ff5670';html+=`<line x1="${x+4}" x2="${x+4}" y1="${scale(c.high)}" y2="${scale(c.low)}" stroke="${color}" stroke-width="2"/><rect x="${x}" y="${y}" width="8" height="${hh}" rx="1" fill="${color}"/>`;}); html+='<text x="70" y="250" fill="#38bdf8" font-size="16">Chart by TradingView</text>'; svg.innerHTML=html; }
function openOrder(){ $('modal').classList.remove('hide'); $('modal').innerHTML=`<div class="modal"><div class="modal-top"><h2>${selected.symbol} Delivery</h2><button class="close" onclick="closeOrder()">×</button></div><p><b>${selected.name} Coin</b><br>Buy <span id="dirText" class="green">${direction}</span></p><p>Delivery time</p><div class="choice"><button>⏱ 60S</button><button id="upBtn" class="up" onclick="setDir('Up')">Up</button><button id="fallBtn" onclick="setDir('Fall')">Fall</button></div><p>Purchase amount</p><div class="input-wrap"><span>₮</span><input id="amount" type="number" placeholder="0"><span>Minimum:1</span></div><small>Available assets: ${balance.toFixed(2)}</small><button class="submit" onclick="submitOrder()">Order</button></div>`; setDir(direction); }
function closeOrder(){ $('modal').classList.add('hide'); }
function setDir(d){ direction=d; const t=$('dirText'),u=$('upBtn'),f=$('fallBtn'); if(t){t.textContent=d;t.className=d==='Up'?'green':'red';u.className=d==='Up'?'up':'';f.className=d==='Fall'?'fall':'';} }
function submitOrder(){ const v=Number($('amount').value); if(!v||v<=0||v>balance){alert('金额错误或余额不足');return;} const win=Math.random()>.45,pnl=Number((win?v*.08:-v*.06).toFixed(2)); balance=Number((balance+pnl).toFixed(2)); orders=[{coin:selected.symbol,direction,value:v,pnl,time:new Date().toLocaleTimeString()},...orders]; localStorage.setItem('demoBalance',balance); localStorage.setItem('demoOrders',JSON.stringify(orders)); $('balance').textContent=balance.toFixed(2); renderHistory(); closeOrder(); if(!$('detail').classList.contains('hide'))renderDetail(); }
$('walletBtn').onclick=async()=>{const err=$('walletError');err.classList.add('hide'); if(!window.ethereum){err.textContent='请用 MetaMask / OKX Wallet / Trust Wallet 的内置浏览器打开。';err.classList.remove('hide');return;} try{const a=await window.ethereum.request({method:'eth_requestAccounts'});const ad=a[0]||'';$('walletBtn').textContent=ad?ad.slice(0,6)+'...'+ad.slice(-4):'Connect wallet';}catch(e){err.textContent='钱包连接被取消，或钱包没有授权。';err.classList.remove('hide');}};
renderList();renderHistory();loadPrices();setInterval(loadPrices,2000);setInterval(()=>selected&&loadKlines(selected.api),60000);
</script>
</body>
</html>
